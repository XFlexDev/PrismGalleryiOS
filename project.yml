name: Prism
options:
  xcodeVersion: "15.4"
targets:
  Prism:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: .
        includes:
          - "**/*.swift"
          - "Info.plist"
    settings:
      INFOPLIST_FILE: Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.minimal.prismgallery
      GENERATE_INFOPLIST_FILE: NO
      CODE_SIGNING_ALLOWED: NO
      CODE_SIGNING_REQUIRED: NO
      CODE_SIGN_IDENTITY: ""
