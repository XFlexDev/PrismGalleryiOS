name: Build Unsigned IPA
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build:
    runs-on: macos-14
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
    - name: Generate Legacy Project Structure
      run: |
        python3 -c '
        import os
        os.makedirs("Prism.xcodeproj", exist_ok=True)
        pbxproj = """// !$*UTF8*$!
        {
            archiveVersion = 1;
            classes = { };
            objectVersion = 56;
            objects = {
                10000001 /* MainGroup */ = {
                    isa = PBXGroup;
                    children = (10000002 /* Info.plist */, 10000003 /* PrismGalleryApp.swift */, 10000004 /* PhotoAsset.swift */, 10000005 /* GalleryViewModel.swift */, 10000006 /* MainGalleryView.swift */, 10000007 /* DetailOverlayView.swift */, 10000008 /* EditorView.swift */);
                    sourceTree = "<group>";
                };
                10000002 /* Info.plist */ = { isa = PBXFileReference; lastKnownFileType = text.plist.xml; path = Info.plist; sourceTree = "<group>"; };
                10000003 /* PrismGalleryApp.swift */ = { isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = PrismGalleryApp.swift; sourceTree = "<group>"; };
                10000004 /* PhotoAsset.swift */ = { isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = PhotoAsset.swift; sourceTree = "<group>"; };
                10000005 /* GalleryViewModel.swift */ = { isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = GalleryViewModel.swift; sourceTree = "<group>"; };
                10000006 /* MainGalleryView.swift */ = { isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = MainGalleryView.swift; sourceTree = "<group>"; };
                10000007 /* DetailOverlayView.swift */ = { isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = DetailOverlayView.swift; sourceTree = "<group>"; };
                10000008 /* EditorView.swift */ = { isa = PBXFileReference; lastKnownFileType = sourcecode.swift; path = EditorView.swift; sourceTree = "<group>"; };
                10000010 /* SourcesBuildPhase */ = { isa = PBXSourcesBuildPhase; buildActionMask = 2147483647; files = (10000023 /* PrismGalleryApp.swift */, 10000024 /* PhotoAsset.swift */, 10000025 /* GalleryViewModel.swift */, 10000026 /* MainGalleryView.swift */, 10000027 /* DetailOverlayView.swift */, 10000028 /* EditorView.swift */); runOnlyForDeploymentPostprocessing = 0; };
                10000023 /* PrismGalleryApp.swift */ = { isa = PBXBuildFile; fileRef = 10000003 /* PrismGalleryApp.swift */; };
                10000024 /* PhotoAsset.swift */ = { isa = PBXBuildFile; fileRef = 10000004 /* PhotoAsset.swift */; };
                10000025 /* GalleryViewModel.swift */ = { isa = PBXBuildFile; fileRef = 10000005 /* GalleryViewModel.swift */; };
                10000026 /* MainGalleryView.swift */ = { isa = PBXBuildFile; fileRef = 10000006 /* MainGalleryView.swift */; };
                10000027 /* DetailOverlayView.swift */ = { isa = PBXBuildFile; fileRef = 10000007 /* DetailOverlayView.swift */; };
                10000028 /* EditorView.swift */ = { isa = PBXBuildFile; fileRef = 10000008 /* EditorView.swift */; };
                10000030 /* NativeTarget */ = { isa = PBXNativeTarget; buildConfigurationList = 10000040 /* TargetBuildConfigList */; buildPhases = (10000010 /* SourcesBuildPhase */); buildRules = ( ); dependencies = ( ); name = Prism; productNamespace = Prism; productName = Prism; productReference = 10000035 /* Prism.app */; productType = "com.apple.product-type.application"; };
                10000035 /* Prism.app */ = { isa = PBXFileReference; explicitFileType = wrapper.application; includeInIndex = 0; path = Prism.app; sourceTree = BUILT_PRODUCTS_DIR; };
                10000038 /* Project */ = { isa = PBXProject; buildConfigurationList = 10000050 /* ProjectBuildConfigList */; compatibilityVersion = "Xcode 14.0"; developmentRegion = en; hasScannedForEncodings = 0; knownRegions = (en, Base); mainGroup = 10000001 /* MainGroup */; productRefGroup = 10000001 /* MainGroup */; projectDirPath = ""; projectRoot = ""; targets = (10000030 /* NativeTarget */); };
                10000041 /* ReleaseTargetConfig */ = { isa = XCBuildConfiguration; buildSettings = { INFOPLIST_FILE = Info.plist; PRODUCT_BUNDLE_IDENTIFIER = com.minimal.prismgallery; PRODUCT_NAME = Prism; EXECUTABLE_NAME = Prism; IPHONEOS_DEPLOYMENT_TARGET = 17.0; MARKETING_VERSION = 1.0; CURRENT_PROJECT_VERSION = 1; CODE_SIGNING_ALLOWED = NO; CODE_SIGNING_REQUIRED = NO; CODE_SIGN_IDENTITY = ""; SDKROOT = iphoneos; SWIFT_VERSION = 5.0; TARGETED_DEVICE_FAMILY = "1,2"; }; name = Release; };
                10000040 /* TargetBuildConfigList */ = { isa = XCConfigurationList; buildConfigurations = (10000041 /* ReleaseTargetConfig */); defaultConfigurationIsVisible = 0; defaultConfigurationName = Release; };
                10000051 /* ReleaseProjectConfig */ = { isa = XCBuildConfiguration; buildSettings = { CODE_SIGNING_ALLOWED = NO; CODE_SIGNING_REQUIRED = NO; CODE_SIGN_IDENTITY = ""; PRODUCT_NAME = Prism; }; name = Release; };
                10000050 /* ProjectBuildConfigList */ = { isa = XCConfigurationList; buildConfigurations = (10000051 /* ReleaseProjectConfig */); defaultConfigurationIsVisible = 0; defaultConfigurationName = Release; };
            };
            rootObject = 10000038 /* Project */;
        }
        """
        with open("Prism.xcodeproj/project.pbxproj", "w") as f:
            f.write(pbxproj)
        '
    - name: Create Build Directories
      run: mkdir -p build
    - name: Build Archive
      run: |
        xcodebuild archive \
          -project Prism.xcodeproj \
          -scheme Prism \
          -destination "generic/platform=iOS" \
          -archivePath build/Prism.xcarchive \
          -configuration Release \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY=""
    - name: Package IPA
      run: |
        mkdir -p build/Payload
        cp -r build/Prism.xcarchive/Products/Applications/Prism.app build/Payload/
        cd build
        zip -r Prism.ipa Payload
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Prism-Unsigned-IPA
        path: build/Prism.ipa
