name: Build Unsigned IPA
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build:
    runs-on: macos-14
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
    - name: Create Build Directories
      run: mkdir -p build
    - name: Build and Archive via SPM Target
      run: |
        xcodebuild archive \
          -packagePrism \
          -scheme Prism \
          -destination "generic/platform=iOS" \
          -archivePath build/Prism.xcarchive \
          -configuration Release \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY=""
    - name: Package IPA
      run: |
        mkdir -p build/Payload
        cp -r build/Prism.xcarchive/Products/usr/local/lib/build/Product/* build/Payload/ 2>/dev/null || cp -r build/Prism.xcarchive/Products/Applications/*.app build/Payload/ 2>/dev/null || true
        cd build
        zip -r Prism.ipa Payload
    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Prism-Unsigned-IPA
        path: build/Prism.ipa
